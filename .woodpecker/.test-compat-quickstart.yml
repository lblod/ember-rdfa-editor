steps:
  setup:
    image: node:24-slim
    commands:
      - npm i -g corepack@0.35
      - pnpm i --no-frozen-lockfile
      - pnpm test:quickstart:setup
  lint:
    image: node:24-slim
    depends_on: [setup]
    commands:
      - cd quickstart
      - npm run lint:js
      - npm run lint:types
  test:
    image: danlynn/ember-cli:6.10.0
    depends_on: [setup]
    commands:
      - cd quickstart
      - npm run test

when:
  event:
    - pull_request

depends_on:
  - verify-pr
